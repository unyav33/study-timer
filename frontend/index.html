<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Timer - แอปจับเวลาอ่านหนังสือ</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="tmer-container">
        <h1>⏰ Study Timer</h1>

        <div class="time-display" id="display">25:00</div>

        <div class="controls">
            <button id="startBtn">เริ่ม (Start)</button>
            <button id="pauseBtn">หยุด (Pause)</button>
            <button id="resetBtn">รีเซ็ต (Reset)</button>
        </div>
    </div>
</div> <script src="app.js"></script>
</body>
</html>
